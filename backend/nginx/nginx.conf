# Xác định số luồng xử lý (1 luồng là đủ cho môi trường dev/đồ án)
worker_processes 1;

events {
    # Số lượng kết nối tối đa một luồng có thể xử lý cùng lúc
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    
    sendfile        on;
    keepalive_timeout  65;

    # =========================================================
    # 1. KHAI BÁO UPSTREAM (CÁC SERVER BÊN DƯỚI NGINX)
    # =========================================================
    upstream nestfinder_gateway {
        server api_gateway:5000;
    }

    # =========================================================
    # 2. CẤU HÌNH SERVER ĐỨNG CHẮN BÊN NGOÀI
    # =========================================================
    server {
        # Lắng nghe ở cổng 80 (Cổng mặc định của HTTP)
        listen 80;
        server_name localhost; # Hoặc api.nestfinder.com nếu có tên miền

        # Đóng gói và chuyển tiếp các request có tiền tố /api/
        location /api/ {
            proxy_pass http://nestfinder_gateway;
            
            # --- CÁC HEADER QUAN TRỌNG (Ghi điểm kiến trúc) ---
            # Nginx đứng giữa sẽ làm mất IP thật của khách. 
            # Các dòng này giúp truyền IP thật của điện thoại khách xuống cho Flask API
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Cấu hình Timeout (đợi Gateway xử lý tối đa 60s trước khi báo lỗi)
            proxy_connect_timeout 60s;
            proxy_read_timeout 60s;
        }

        # =========================================================
        # 3. TRANG THÔNG BÁO LỖI TÙY CHỈNH (CUSTOM ERROR PAGE)
        # =========================================================
        # Nếu API Gateway sập (Lỗi 502 Bad Gateway), Nginx sẽ tự trả về JSON đẹp mắt
        # thay vì trang HTML báo lỗi mặc định xấu xí của Nginx.
        error_page 502 /502_error;
        location = /502_error {
            return 502 '{"error": "502 Bad Gateway", "message": "Hệ thống NestFinder đang bảo trì hoặc API Gateway đang offline."}';
            default_type application/json;

            # Thêm CORS vào trang lỗi để Flutter Web không bị mù thông tin
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE' always;
            add_header 'Access-Control-Allow-Headers' '*' always;
            
            return 502 '{"error": "502 Bad Gateway", "message": "Hệ thống NestFinder đang bảo trì hoặc API Gateway đang offline."}';
        }

        # Định tuyến cho Đăng nhập / Đăng ký
        location /api/v1/auth/ {
            proxy_pass http://user_service:8001;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Định tuyến cho Lấy Profile cá nhân
        location /api/v1/users/ {
            proxy_pass http://user_service:8001;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
        }
    }